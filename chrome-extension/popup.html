<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
    .header { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .icon { font-size: 20px; }
    .header .version { font-size: 10px; opacity: 0.7; }
    .content { padding: 16px; }
    .status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .status.connected { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.disconnected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status.connected .dot { background: #16a34a; }
    .status.disconnected .dot { background: #dc2626; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 8px; transition: all 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover { background: #15803d; }
    .job-info { background: #f8fafc; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .job-info h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .job-info p { font-size: 12px; color: #64748b; }
    .job-info .salary { color: #16a34a; font-weight: 600; font-size: 13px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat { background: #f8fafc; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
    .stat .num { font-size: 20px; font-weight: 700; color: #2563eb; }
    .stat .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .divider { height: 1px; background: #f1f5f9; margin: 12px 0; }
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .quick-actions .btn { margin-bottom: 0; font-size: 12px; padding: 8px; }
    .footer { padding: 12px 16px; border-top: 1px solid #f1f5f9; text-align: center; }
    .footer a { font-size: 11px; color: #94a3b8; text-decoration: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">&#9889;</span>
    <div>
      <h1>AutoApply AI</h1>
      <span class="version">v2.0 — Chrome Extension</span>
    </div>
  </div>

  <div class="content">
    <div id="status" class="status disconnected">
      <span class="dot"></span>
      Not logged in
    </div>

    <div id="job-detected" class="job-info hidden">
      <h3 id="job-title">Job Title</h3>
      <p id="job-company">Company</p>
      <p id="job-salary" class="salary hidden"></p>
    </div>

    <div id="stats" class="stats hidden">
      <div class="stat">
        <div class="num" id="stat-apps">0</div>
        <div class="label">Applied</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-saved">0</div>
        <div class="label">Saved</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-interviews">0</div>
        <div class="label">Interviews</div>
      </div>
    </div>

    <button id="btn-save" class="btn btn-secondary hidden" onclick="saveJob()">
      &#128278; Save This Job
    </button>
    <button id="btn-apply" class="btn btn-success hidden" onclick="quickApply()">
      &#9889; Quick Apply with AI
    </button>

    <a href="https://autoapply-ai-vert.vercel.app/login" target="_blank" id="btn-login" class="btn btn-primary">
      Log In to AutoApply AI
    </a>

    <div class="divider"></div>

    <div class="quick-actions">
      <a href="https://autoapply-ai-vert.vercel.app/dashboard" target="_blank" class="btn btn-secondary">Dashboard</a>
      <a href="https://autoapply-ai-vert.vercel.app/job-agent" target="_blank" class="btn btn-secondary">Job Agent</a>
      <a href="https://autoapply-ai-vert.vercel.app/tracker" target="_blank" class="btn btn-secondary">Tracker</a>
      <a href="https://autoapply-ai-vert.vercel.app/resume" target="_blank" class="btn btn-secondary">Resume</a>
    </div>
  </div>

  <div class="footer">
    <a href="https://autoapply-ai-vert.vercel.app" target="_blank">autoapply-ai-vert.vercel.app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
